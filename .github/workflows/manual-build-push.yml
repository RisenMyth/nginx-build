name: Manual Docker Build And Push

on:
  workflow_dispatch:
    inputs:
      registry:
        description: "目标 registry 地址，仅包含 host[:port]，留空时回退到 vars/secrets.REGISTRY"
        required: false
        default: ""
      image_repository:
        description: "镜像仓库名，不包含 registry，例如 team/nginx-build"
        required: true
        default: "nginx-brotli"
      image_tag:
        description: "镜像标签"
        required: true
        default: "latest"
      nginx_version:
        description: "Docker build arg: NGINX_VERSION"
        required: true
        default: "1.27.4"
      push_latest:
        description: "当 tag 不是 latest 时，是否额外推送 latest"
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_INPUT: ${{ inputs.registry || vars.REGISTRY || secrets.REGISTRY }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE || secrets.REGISTRY_NAMESPACE }}
      REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME || secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD || vars.REGISTRY_PASSWORD }}
      IMAGE_REPOSITORY: ${{ inputs.image_repository }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      PUSH_LATEST: ${{ inputs.push_latest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize registry reference
        id: image
        shell: bash
        run: |
          set -euo pipefail
          raw_registry="${REGISTRY_INPUT%/}"
          registry_namespace="${REGISTRY_NAMESPACE#/}"
          registry_namespace="${registry_namespace%/}"
          image_repository="${IMAGE_REPOSITORY#/}"
          image_repository="${image_repository%/}"

          test -n "${raw_registry}" || { echo "::error::Missing registry. Set workflow input or vars/secrets.REGISTRY."; exit 1; }
          test -n "${REGISTRY_USERNAME}" || { echo "::error::Missing registry username. Set vars/secrets.REGISTRY_USERNAME."; exit 1; }
          test -n "${REGISTRY_PASSWORD}" || { echo "::error::Missing registry password. Set vars/secrets.REGISTRY_PASSWORD."; exit 1; }
          test -n "${image_repository}" || { echo "::error::Missing image repository."; exit 1; }

          if [[ "${raw_registry}" == *"://"* ]]; then
            echo "::error::Registry must not include a protocol. Use registry.example.com or registry.example.com:5000."
            exit 1
          fi

          if [[ "${raw_registry}" == */* ]]; then
            echo "::error::Registry must not include a namespace. Set vars/secrets.REGISTRY_NAMESPACE separately."
            exit 1
          fi

          if [[ -z "${raw_registry}" ]]; then
            echo "::error::Invalid registry value: ${raw_registry}"
            exit 1
          fi

          image_ref="${raw_registry}"
          if [[ -n "${registry_namespace}" ]]; then
            image_ref="${image_ref}/${registry_namespace}"
          fi
          image_ref="${image_ref}/${image_repository}"

          echo "registry_host=${raw_registry}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.image.outputs.registry_host }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tags="${{ steps.image.outputs.image_ref }}:${IMAGE_TAG}"
          if [ "${PUSH_LATEST}" = "true" ] && [ "${IMAGE_TAG}" != "latest" ]; then
            tags="${tags}"$'\n'"${{ steps.image.outputs.image_ref }}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NGINX_VERSION=${{ inputs.nginx_version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=docker-build-cache
          cache-to: type=gha,mode=max,scope=docker-build-cache
